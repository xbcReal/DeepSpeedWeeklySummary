            border: 1px solid var(--border);

            margin-bottom: 12px;

            text-decoration: none;
            font-weight: 600;

        }
        .archive-section {
            margin-top: 48px;

            padding-bottom: 8px;

        }
        .archive-list {
            list-style: none;
        }
        .archive-list li {
            margin-bottom: 8px;
        }
        .archive-list a {
            color: var(--link);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .archive-list a:hover {
            background: rgba(88, 166, 255, 0.1);
        }
        .archive-list .date {
            color: var(--text-muted);
            font-size: 0.9em;
