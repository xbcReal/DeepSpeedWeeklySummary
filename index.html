<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSpeed Weekly Summary</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --link: #58a6ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.5em;
            color: var(--primary);
            margin-bottom: 8px;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 1.2em;
        }
        .countdown-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 32px;
            text-align: center;
        }
        .countdown-box p {
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .countdown-box .timer {
            color: var(--primary);
            font-size: 1.5em;
            font-weight: bold;
        }
        .countdown-box a {
            color: var(--link);
            text-decoration: none;
            font-weight: 600;
        }
        .countdown-box a:hover {
            text-decoration: underline;
        }
        .latest-section, .archive-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .latest-section h2, .archive-section h2 {
            font-size: 1.3em;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .latest-section .badge {
            background: var(--primary);
            color: white;
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 12px;
        }
        .report-list {
            list-style: none;
        }
        .report-list li {
            margin-bottom: 12px;
        }
        .report-list a {
            color: var(--link);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            transition: background 0.2s;
            border: 1px solid transparent;
        }
        .report-list a:hover {
            background: rgba(88, 166, 255, 0.1);
            border-color: var(--border);
        }
        .report-list .title {
            font-weight: 500;
        }
        .report-list .date {
            color: var(--text-muted);
            font-size: 0.9em;
            white-space: nowrap;
        }
        .report-list .latest {
            background: rgba(37, 99, 235, 0.1);
            border-color: var(--primary);
        }
        .cancel-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 12px;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .cancel-btn:hover {
            border-color: var(--text);
            color: var(--text);
        }
        .cancel-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9em;
            margin-top: 40px;
        }
        .footer a {
            color: var(--link);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>DeepSpeed Weekly</h1>
            <p class="subtitle">GitHub Repository Weekly Tracking Report</p>
        </header>

        <div class="countdown-box" id="countdownBox">
            <p>将在 <span class="timer" id="timer">5</span> 秒后自动跳转到最新周报</p>
            <a href="ds-summary/deepspeed-weekly-report-2026-04-13.html">立即查看最新周报 →</a>
            <br>
            <button class="cancel-btn" id="cancelBtn" onclick="cancelRedirect()">取消自动跳转</button>
        </div>

        <div class="latest-section">
            <h2>
                <span>最新周报</span>
                <span class="badge">NEW</span>
            </h2>
            <ul class="report-list">
                <li>
                    <a href="ds-summary/deepspeed-weekly-report-2026-04-13.html" class="latest">
                        <span class="title">DeepSpeed Weekly Report - 2026-04-13</span>
                        <span class="date">2026-04-13</span>
                    </a>
                </li>
            </ul>
        </div>

        <div class="archive-section">
            <h2>历史周报</h2>
            <ul class="report-list" id="archiveList">
                <li>
                    <a href="ds-summary/deepspeed-weekly-report-2026-04-13.html">
                        <span class="title">DeepSpeed Weekly Report - 2026-04-13</span>
                        <span class="date">2026-04-13</span>
                    </a>
                </li>
            </ul>
        </div>

        <div class="footer">
            <p>数据来源: <a href="https://github.com/microsoft/DeepSpeed" target="_blank">microsoft/DeepSpeed</a></p>
        </div>
    </div>

    <script>
        let countdown = 5;
        let timerId = null;
        const latestReportUrl = 'ds-summary/deepspeed-weekly-report-2026-04-13.html';

        function updateTimer() {
            const timerEl = document.getElementById('timer');
            timerEl.textContent = countdown;

            if (countdown <= 0) {
                window.location.href = latestReportUrl;
            } else {
                countdown--;
                timerId = setTimeout(updateTimer, 1000);
            }
        }

        function cancelRedirect() {
            if (timerId) {
                clearTimeout(timerId);
                timerId = null;
            }
            const box = document.getElementById('countdownBox');
            const btn = document.getElementById('cancelBtn');
            box.innerHTML = '<p style="color: var(--text-muted);">自动跳转已取消，请手动选择周报查看</p>';
            btn.disabled = true;
        }

        // 启动倒计时
        timerId = setTimeout(updateTimer, 1000);

        // 动态扫描 ds-summary 目录下的所有周报文件
        async function loadArchiveList() {
            // 这里可以通过 fetch 获取目录列表，或者由 Qoder Worker 生成时更新
            // 目前使用静态列表，Qoder Worker 生成新报告时可以更新此列表
        }
    </script>
</body>
</html>
